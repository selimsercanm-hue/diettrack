<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>🔥 DietAI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080810;--bg2:#0f0f1a;--card:rgba(255,255,255,0.04);
  --border:rgba(255,140,50,0.18);--orange:#ff8c32;--orange2:#ff6b00;
  --green:#39e07a;--red:#ff4d6d;--blue:#38c8f0;--purple:#b47cff;
  --text:#f0ede8;--muted:#5a5870;--subtle:#2a2840;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);overscroll-behavior:none}
body{color:var(--text);font-family:'DM Sans',sans-serif;padding-bottom:72px}
h1,h2,h3,.syne{font-family:'Syne',sans-serif}
input,textarea,select{font-family:'DM Sans',sans-serif;-webkit-appearance:none;appearance:none;background:rgba(255,255,255,0.06);border:1px solid rgba(255,140,50,0.25);border-radius:14px;color:var(--text);font-size:15px;outline:none;padding:13px 16px;width:100%;box-sizing:border-box;transition:border .2s}
input:focus,textarea:focus{border-color:var(--orange)}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
textarea{resize:none;min-height:80px;line-height:1.5}
button{cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .15s,transform .1s}
button:active{transform:scale(0.97)}

/* cards */
.card{background:var(–card);border:1px solid var(–border);border-radius:20px;padding:18px;margin-bottom:14px}
.card-title{font-family:‘Syne’,sans-serif;font-size:10px;color:var(–muted);text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:14px}

/* buttons */
.btn{display:block;width:100%;padding:14px;border-radius:14px;border:none;font-size:15px;font-weight:600;color:#fff;background:linear-gradient(135deg,var(–orange),var(–orange2));margin-bottom:0}
.btn-ghost{background:rgba(255,255,255,0.07);color:var(–text)}
.btn-blue{background:linear-gradient(135deg,#38c8f0,#0ea5c9)}
.btn-green{background:linear-gradient(135deg,#39e07a,#22c55e);color:#0a1a0f}
.btn-sm{padding:8px 16px;font-size:13px;font-weight:600;border-radius:10px;border:none;cursor:pointer}

/* nav */
.nav{position:fixed;bottom:0;left:0;right:0;display:flex;background:rgba(8,8,16,0.96);border-top:1px solid rgba(255,140,50,0.12);z-index:99;backdrop-filter:blur(20px);padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;padding:10px 2px 8px;border:none;background:transparent;color:var(–muted);display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;font-weight:500;border-top:2px solid transparent;font-family:‘DM Sans’,sans-serif}
.nav-btn.active{color:var(–orange);border-top-color:var(–orange);font-weight:700}
.nav-btn .ic{font-size:21px;line-height:1}

/* header */
.header{padding:18px 18px 12px;border-bottom:1px solid rgba(255,140,50,0.1);background:rgba(8,8,16,0.9);position:sticky;top:0;z-index:10;backdrop-filter:blur(20px)}

/* pages */
.page{display:none;padding:16px;min-height:60vh}
.page.active{display:block;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* progress */
.prog-bg{height:8px;background:rgba(255,255,255,0.06);border-radius:6px;overflow:hidden;margin-top:6px}
.prog-fill{height:100%;border-radius:6px;transition:width .6s cubic-bezier(.4,0,.2,1)}

/* food items */
.food-row{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;background:rgba(255,255,255,0.03);border-radius:12px;margin-bottom:7px;border:1px solid rgba(255,255,255,0.05);transition:background .15s}
.food-row:active{background:rgba(255,140,50,0.07)}
.rm-btn{background:rgba(255,77,109,0.12);border:1px solid rgba(255,77,109,0.2);color:var(–red);border-radius:8px;padding:4px 10px;font-size:12px}

/* meal tabs */
.meal-tabs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.meal-tab{padding:8px 15px;border-radius:22px;border:1px solid rgba(255,255,255,0.1);font-size:13px;font-weight:600;background:transparent;color:var(–muted)}
.meal-tab.active{background:var(–orange);color:#fff;border-color:var(–orange)}

/* stat boxes */
.stat-row{display:flex;gap:10px;margin-bottom:14px}
.stat-box{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:13px 10px;text-align:center}
.stat-val{font-family:‘Syne’,sans-serif;font-size:22px;font-weight:800;line-height:1}
.stat-lbl{font-size:10px;color:var(–muted);margin-top:3px}

/* AI chat bubble */
.ai-bubble{background:linear-gradient(135deg,rgba(255,140,50,0.1),rgba(180,124,255,0.08));border:1px solid rgba(255,140,50,0.2);border-radius:16px;padding:14px 16px;margin-bottom:10px;font-size:14px;line-height:1.6;color:var(–text)}
.user-bubble{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:12px 16px;margin-bottom:10px;font-size:14px;color:var(–muted);text-align:right}

/* loading */
.loading{display:inline-flex;gap:4px;align-items:center}
.loading span{width:6px;height:6px;border-radius:50%;background:var(–orange);animation:bounce .8s infinite}
.loading span:nth-child(2){animation-delay:.15s}
.loading span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:scale(0.7);opacity:.5}40%{transform:scale(1);opacity:1}}

/* photo preview */
.photo-preview{width:100%;max-height:200px;object-fit:cover;border-radius:14px;margin-bottom:10px;display:none}

/* plan card */
.plan-card{border:2px solid rgba(255,255,255,0.08);border-radius:18px;padding:16px;margin-bottom:12px;cursor:pointer;transition:all .2s}
.plan-card.selected{border-color:var(–orange);background:rgba(255,140,50,0.07)}
.plan-card:active{transform:scale(0.98)}

/* calorie ring */
.cal-ring-wrap{display:flex;justify-content:center;margin-bottom:6px}

/* zone */
.zone{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);margin-bottom:7px}
.zone.active{background:rgba(255,140,50,0.08);border-color:rgba(255,140,50,0.25)}
.dot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,0.12);flex-shrink:0}
.dot.on{background:var(–orange)}

/* setup */
.setup-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse at 50% 0%,rgba(255,140,50,0.12) 0%,transparent 70%),var(–bg)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.label{font-size:11px;color:var(–muted);display:block;margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}

/* deadline bar */
.dl-bar{height:4px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden;margin-top:8px}
.dl-fill{height:100%;background:linear-gradient(90deg,var(–orange),var(–red));border-radius:2px;transition:width .5s}

/* calorie budget */
.budget-big{font-family:‘Syne’,sans-serif;font-size:52px;font-weight:900;line-height:1;text-align:center}
.budget-sub{font-size:13px;color:var(–muted);text-align:center;margin-top:4px}

/* image input area */
.img-area{border:2px dashed rgba(255,140,50,0.25);border-radius:16px;padding:20px;text-align:center;margin-bottom:12px;cursor:pointer;transition:all .2s}
.img-area:active{background:rgba(255,140,50,0.05)}

/* tags */
.tag{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;margin-right:5px;margin-bottom:4px}
</style>

</head>
<body>

<!-- SETUP -->

<div id="setup-screen" class="setup-wrap">
  <div style="font-family:'Syne',sans-serif;font-size:32px;font-weight:900;background:linear-gradient(135deg,#ff8c32,#ff6b00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;text-align:center">🔥 DietAI</div>
  <div style="color:var(--muted);font-size:14px;margin-bottom:28px;text-align:center">Yapay zeka destekli diyet takibi</div>
  <div class="card" style="width:100%;max-width:420px">
    <div class="card-title">API Bağlantısı</div>
    <label class="label">ANTHROPIC API KEY</label>
    <input id="s-apikey" type="password" placeholder="sk-ant-..." style="margin-bottom:16px">
    <div style="background:rgba(255,140,50,0.07);border-radius:12px;padding:12px;font-size:12px;color:var(--muted);margin-bottom:20px;line-height:1.6">
      🔒 API key sadece senin telefonunda saklanır, hiçbir yere gönderilmez.
    </div>
    <div class="card-title" style="margin-top:4px">Profilini Oluştur</div>
    <div class="grid2" style="margin-bottom:10px">
      <div><label class="label">KİLO (kg)</label><input id="s-weight" type="number" placeholder="80"></div>
      <div><label class="label">BOY (cm)</label><input id="s-height" type="number" placeholder="178"></div>
    </div>
    <div class="grid2" style="margin-bottom:10px">
      <div><label class="label">MEVCUT YAĞ %</label><input id="s-curfat" type="number" placeholder="22"></div>
      <div><label class="label">HEDEF YAĞ %</label><input id="s-tgtfat" type="number" placeholder="15"></div>
    </div>
    <label class="label">DİYET BİTİŞ TARİHİ</label>
    <input id="s-deadline" type="date" style="margin-bottom:10px">
    <label class="label">GÜNLÜK SU HEDEFİ (bardak)</label>
    <input id="s-water" type="number" placeholder="8" value="8" style="margin-bottom:20px">
    <button class="btn" onclick="doSetup()">Devam → Diyet Planı Seç</button>
  </div>
</div>

<!-- PLAN SEÇ -->

<div id="plan-screen" style="display:none;min-height:100vh;padding:24px;background:radial-gradient(ellipse at 50% 0%,rgba(255,140,50,0.1) 0%,transparent 60%),var(--bg)">
  <div style="font-family:'Syne',sans-serif;font-size:22px;font-weight:900;margin-bottom:4px">🎯 Hedefini Seç</div>
  <div style="color:var(--muted);font-size:14px;margin-bottom:20px">Claude sana özel diyet planı önerecek</div>
  <div class="card">
    <div class="card-title">Hedefin nedir?</div>
    <textarea id="plan-goal" placeholder="Örn: 3 ayda 8 kilo vermek istiyorum, sabah spor yapıyorum, akşam yemeklerini kontrol edemiyorum..." style="margin-bottom:12px"></textarea>
    <button class="btn" onclick="getPlanSuggestions()">
      <span id="plan-btn-text">✨ Claude'dan Plan Önerileri Al</span>
    </button>
  </div>
  <div id="plans-container"></div>
</div>

<!-- MAIN -->

<div id="main-screen" style="display:none">
  <div class="header" id="main-header"></div>
  <div id="page-dashboard" class="page active"></div>
  <div id="page-ai" class="page"></div>
  <div id="page-meals" class="page"></div>
  <div id="page-fasting" class="page"></div>
  <div id="page-settings" class="page"></div>
  <nav class="nav">
    <button class="nav-btn active" onclick="goTab('dashboard',this)"><span class="ic">🏠</span>Özet</button>
    <button class="nav-btn" onclick="goTab('ai',this)"><span class="ic">🤖</span>AI Koç</button>
    <button class="nav-btn" onclick="goTab('meals',this)"><span class="ic">🍽️</span>Öğünler</button>
    <button class="nav-btn" onclick="goTab('fasting',this)"><span class="ic">⏱️</span>Açlık</button>
    <button class="nav-btn" onclick="goTab('settings',this)"><span class="ic">⚙️</span>Ayarlar</button>
  </nav>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
var API_URL = 'https://api.anthropic.com/v1/messages';

// ── STORAGE ───────────────────────────────────────────────────────────────────
function ld(k,fb){try{var r=localStorage.getItem(k);return r!==null?JSON.parse(r):fb}catch(e){return fb}}
function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function today(){return new Date().toISOString().split('T')[0]}
function fmtTime(iso){if(!iso)return'';return new Date(iso).toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'})}
function fmtDate(s){return new Date(s).toLocaleDateString('tr-TR',{day:'numeric',month:'short'})}
function daysLeft(dl){return Math.max(0,Math.ceil((new Date(dl)-new Date(today()))/86400000))}
function calcTDEE(w,h){return Math.round((10*w+6.25*h-5*30+5)*1.55)}
function hoursAgo(iso){if(!iso)return 0;return(new Date()-new Date(iso))/3600000}
function pct(v,t){return t?Math.min(100,Math.round(v/t*100)):0}
function progBar(p,color,height){
  height=height||8;
  return '<div class="prog-bg" style="height:'+height+'px"><div class="prog-fill" style="width:'+Math.min(p,100)+'%;background:'+color+'"></div></div>';
}

// ── STATE ─────────────────────────────────────────────────────────────────────
var profile = ld('profile2', null);
var allData = ld('dietdata2', {});
var selMeal = 'Kahvaltı';
var searchQ = '';
var MEALS = ['Kahvaltı','Öğle','Akşam','Atıştırmalık'];

function getTd(){
  if(!allData[today()]) allData[today()]={meals:{Kahvaltı:[],Öğle:[],Akşam:[],Atıştırmalık:[]},water:0,weight:null,steps:0,exercise:0,lastMeal:null};
  return allData[today()];
}
function saveTd(){sv('dietdata2',allData)}

// ── CLAUDE API ────────────────────────────────────────────────────────────────
async function callClaude(messages, systemPrompt, imageBase64, imageMime) {
  var key = profile ? profile.apiKey : document.getElementById('s-apikey').value;
  if(!key){alert('API key bulunamadı!');return null}

  var msgContent = [];
  if(imageBase64){
    msgContent.push({type:'image',source:{type:'base64',media_type:imageMime||'image/jpeg',data:imageBase64}});
  }
  msgContent.push({type:'text',text:messages[messages.length-1].content});

  var body = {
    model: 'claude-sonnet-4-20250514',
    max_tokens: 1000,
    system: systemPrompt || 'Sen bir beslenme ve diyet uzmanısın. Türkçe cevap ver. Kısa ve net ol.',
    messages: messages.length > 1
      ? messages.slice(0,-1).concat([{role:'user',content:msgContent}])
      : [{role:'user',content:msgContent}]
  };

  try {
    var res = await fetch(API_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body: JSON.stringify(body)
    });
    var data = await res.json();
    if(data.error){console.error(data.error);return 'Hata: '+data.error.message}
    return data.content[0].text;
  } catch(e) {
    return 'Bağlantı hatası: '+e.message;
  }
}

// ── SETUP ─────────────────────────────────────────────────────────────────────
function doSetup(){
  var key = document.getElementById('s-apikey').value.trim();
  var w = document.getElementById('s-weight').value;
  var h = document.getElementById('s-height').value;
  var cf = document.getElementById('s-curfat').value;
  var tf = document.getElementById('s-tgtfat').value;
  var dl = document.getElementById('s-deadline').value;
  if(!key){alert('API key zorunlu!');return}
  if(!w||!h||!cf||!tf||!dl){alert('Tüm alanları doldur!');return}
  var tdee = calcTDEE(+w,+h);
  profile = {apiKey:key,weight:+w,height:+h,currentFat:+cf,targetFat:+tf,deadline:dl,tdee:tdee,calorieGoal:Math.round(tdee*0.8),waterGoal:+(document.getElementById('s-water').value)||8,planName:'',planDesc:''};
  sv('profile2',profile); sv('startDate2',today());
  document.getElementById('setup-screen').style.display='none';
  document.getElementById('plan-screen').style.display='block';
}

// ── PLAN ──────────────────────────────────────────────────────────────────────
async function getPlanSuggestions(){
  var goal = document.getElementById('plan-goal').value;
  if(!goal.trim()){alert('Hedefini yaz!');return}
  var btn = document.getElementById('plan-btn-text');
  btn.innerHTML = '<span class="loading"><span></span><span></span><span></span></span>';

  var sys = 'Sen uzman bir diyetisyen ve fitness koçusun. Türkçe, pratik ve bilimsel cevaplar ver. JSON formatında cevap ver.';
  var msg = 'Kullanıcı profili: '+profile.weight+'kg, '+profile.height+'cm boy, %'+profile.currentFat+' yağ oranı, hedef %'+profile.targetFat+', TDEE='+profile.tdee+' kcal, deadline='+profile.deadline+'\n\nKullanıcının hedefi: '+goal+'\n\nBu profile göre 3 farklı diyet planı öner. Her plan için JSON formatında şu bilgileri ver:\n[\n  {\n    "name": "Plan adı",\n    "desc": "2 cümle açıklama",\n    "calorieGoal": 1800,\n    "type": "Intermittent Fasting / Düşük Karb / Dengeli",\n    "pros": ["avantaj1","avantaj2"],\n    "weeklyLoss": "0.5-0.7 kg/hafta"\n  }\n]\n\nSadece JSON döndür, başka hiçbir şey yazma.';

  var res = await callClaude([{role:'user',content:msg}], sys);
  btn.innerHTML = '✨ Claude\'dan Plan Önerileri Al';
  if(!res) return;

  try {
    var clean = res.replace(/```json|```/g,'').trim();
    var plans = JSON.parse(clean);
    renderPlanCards(plans);
  } catch(e) {
    document.getElementById('plans-container').innerHTML = '<div class="card" style="color:var(--muted);font-size:14px">'+res+'</div>';
  }
}

function renderPlanCards(plans){
  var html = '<div style="margin-top:4px">';
  plans.forEach(function(p,i){
    html += '<div class="plan-card" onclick="selectPlan('+i+',this)" data-idx="'+i+'" id="plancard-'+i+'">' +
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">' +
        '<div style="font-family:Syne,sans-serif;font-size:16px;font-weight:800">'+p.name+'</div>' +
        '<span style="font-size:11px;background:rgba(255,140,50,0.12);color:var(--orange);padding:3px 9px;border-radius:20px;font-weight:600">'+p.calorieGoal+' kcal</span>' +
      '</div>' +
      '<div style="font-size:13px;color:var(--muted);margin-bottom:10px;line-height:1.5">'+p.desc+'</div>' +
      '<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px">' +
        (p.pros||[]).map(function(pr){return '<span class="tag" style="background:rgba(57,224,122,0.1);color:var(--green);border:1px solid rgba(57,224,122,0.2)">✓ '+pr+'</span>'}).join('') +
      '</div>' +
      '<div style="font-size:12px;color:var(--muted)">📈 Tahmini: <strong style="color:var(--text)">'+p.weeklyLoss+'</strong></div>' +
      '<input type="hidden" id="plan-data-'+i+'" value=\''+JSON.stringify(p).replace(/'/g,"&#39;")+'\'>' +
    '</div>';
  });
  html += '<button class="btn" style="margin-top:4px" onclick="startWithPlan()">Bu Planla Başla →</button></div>';
  document.getElementById('plans-container').innerHTML = html;
  window._plans = plans;
  window._selectedPlan = 0;
  document.getElementById('plancard-0').classList.add('selected');
}

function selectPlan(idx, el){
  document.querySelectorAll('.plan-card').forEach(function(c){c.classList.remove('selected')});
  el.classList.add('selected');
  window._selectedPlan = idx;
}

function startWithPlan(){
  if(window._plans && window._plans[window._selectedPlan]){
    var p = window._plans[window._selectedPlan];
    profile.calorieGoal = p.calorieGoal;
    profile.planName = p.name;
    profile.planDesc = p.desc;
    profile.planType = p.type;
    sv('profile2', profile);
  }
  document.getElementById('plan-screen').style.display='none';
  document.getElementById('main-screen').style.display='block';
  renderAll();
}

// ── FOOD ACTIONS ──────────────────────────────────────────────────────────────
function addFood(food){
  var td=getTd(), time=new Date().toISOString();
  td.meals[selMeal].push(Object.assign({},food,{id:Date.now(),time:time}));
  td.lastMeal=time; saveTd(); renderAll();
}
function rmFood(meal,id){
  var td=getTd();
  td.meals[meal]=td.meals[meal].filter(function(f){return f.id!==id});
  var times=[];
  MEALS.forEach(function(m){td.meals[m].forEach(function(f){if(f.time)times.push(f.time)})});
  times.sort(); td.lastMeal=times.length?times[times.length-1]:null;
  saveTd(); renderAll();
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function goTab(name,btnEl){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active')});
  document.getElementById('page-'+name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active')});
  btnEl.classList.add('active');
  renderAll();
}

// ── RENDER ALL ────────────────────────────────────────────────────────────────
function renderAll(){
  renderHeader();
  renderDashboard();
  renderAI();
  renderMeals();
  renderFasting();
  renderSettings();
}

// ── HEADER ────────────────────────────────────────────────────────────────────
function renderHeader(){
  if(!profile)return;
  var dl=daysLeft(profile.deadline);
  var startDate=ld('startDate2',today());
  var totalDays=Math.max(1,Math.ceil((new Date(profile.deadline)-new Date(startDate))/86400000));
  var passed=totalDays-dl;
  var color=dl<7?'var(--red)':'var(--orange)';
  document.getElementById('main-header').innerHTML=
    '<div style="display:flex;justify-content:space-between;align-items:center">' +

function previewPhoto(input){

reader.onload=function(e){

async function sendToAI(){
var input=document.getElementById(‘ai-input’).value.trim();
if(!input&&!pendingImage){alert(‘Bir şey yaz veya fotoğraf ekle!’);return}

var td=getTd();
var allFoods=[]; MEALS.forEach(function(m){if(td.meals[m])allFoods=allFoods.concat(td.meals[m])});
var totalCal=allFoods.reduce(function(s,f){return s+f.cal},0);
var remaining=profile.calorieGoal-totalCal;

var userMsg=input||(pendingImage?‘Bu yemeği analiz et’:’’);
aiHistory.push({role:‘user’,content:userMsg+(pendingImage?’ [📸 Fotoğraf eklendi]’:’’)});

var btn=document.getElementById(‘ai-send-btn’);
if(btn)btn.innerHTML=’<span class="loading"><span></span><span></span><span></span></span>’;

var sys=’Sen uzman bir diyetisyen ve beslenme koçusun. Türkçe cevap ver.\n\nKullanıcı profili:\n- ’+profile.weight+‘kg, ‘+profile.height+‘cm, %’+profile.currentFat+’ yağ\n- Günlük kalori hedefi: ‘+profile.calorieGoal+’ kcal\n- Bugün tüketilen: ‘+totalCal+’ kcal\n- Kalan kalori: ‘+remaining+’ kcal\n- Diyet planı: ‘+(profile.planName||‘Belirsiz’)+’\n\nEğer yemek sorusu/fotoğrafı ise:\n1. Yemeğin yaklaşık kalori, protein, karbonhidrat, yağ değerlerini ver\n2. Bu öğünü diyetiyle uyumlu mu değerlendir\n3. Kısa bir öneri ver\n4. JSON bloğu ekle: `json\n{"name":"yemek adı","cal":300,"carb":30,"prot":25,"fat":8}\n`\nEğer genel soru ise sadece cevapla.’;

var msgs=[{role:‘user’,content:userMsg}];
var res=await callClaude(msgs,sys,pendingImage,pendingImageMime);

// parse JSON if present
if(res){
var jsonMatch=res.match(/`json\s*([\s\S]*?)`/);
if(jsonMatch){
try{
var foodData=JSON.parse(jsonMatch[1].trim());
if(foodData.cal){
var addBtn=’<button onclick="addAIFood(\''+encodeURIComponent(JSON.stringify(foodData))+'\')" style="display:inline-block;margin-top:10px;padding:8px 16px;border-radius:10px;border:none;background:var(--orange);color:#fff;font-weight:700;font-size:13px;cursor:pointer">+ ‘+selMeal+’'a Ekle</button>’;
res=res.replace(/`json[\s\S]*?`/,’’)+addBtn;
}
}catch(e){}
}
}

aiHistory.push({role:‘assistant’,content:res||‘Cevap alınamadı’});
pendingImage=null; pendingImageMime=null;

if(btn)btn.innerHTML=‘✨ Analiz Et’;
document.getElementById(‘ai-input’).value=’’;
var ph=document.getElementById(‘img-placeholder’);
var pv=document.getElementById(‘photo-preview’);
if(ph)ph.style.display=‘block’;
if(pv){pv.style.display=‘none’;pv.src=’’;}
renderAI();
}

function saveActivity(){
var w=parseFloat(document.getElementById(‘w-input’).value);
var s=document.getElementById(‘steps-in’).value;
var e=document.getElementById(‘ex-in’).value;
var td=getTd();
if(!isNaN(w)&&w>0) td.weight=w;
if(s) td.steps=+s;
if(e) td.exercise=+e;
saveTd(); renderAll(); alert(‘Kaydedildi!’);
}
function saveSettings(){
profile.calorieGoal=+document.getElementById(‘set-cal’).value||profile.calorieGoal;
profile.deadline=document.getElementById(‘set-dl’).value||profile.deadline;
profile.waterGoal=+document.getElementById(‘set-water’).value||profile.waterGoal;
sv(‘profile2’,profile); renderAll(); alert(‘Kaydedildi!’);
}
